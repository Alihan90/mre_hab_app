name: Flutter CI Main

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy_apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct Android Project
        run: |
          flutter create --platforms=android --project-name=amre_hab_app .
          flutter pub get

      - name: Update Gradle Config for Android 34
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdk .*/compileSdk 34/g' android/app/build.gradle || true
            sed -i 's/targetSdk .*/targetSdk 34/g' android/app/build.gradle || true
          fi

      - name: Compile Application APK
        run: flutter build apk --release --no-tree-shake-icons
