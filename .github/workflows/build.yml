name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Configure Flutter SDK Version
      run: |
        # Офіційне налаштування Flutter, яке глобально задає версію Android SDK 34
        flutter config --android-sdk-preview=true

    - name: Clean and Recreate Android Project
      run: |
        rm -rf android
        flutter create . --platforms=android

    - name: Update SDK Version in Gradle Build
      run: |
        # Точково міняємо версію лише в згенерованому файлі налаштувань програмного додатка
        if [ -f android/app/build.gradle ]; then
          sed -i 's/compileSdk = .*/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk = .*/targetSdk = 34/g' android/app/build.gradle
        fi

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rehabilitation-app-release
        path: build/app/outputs/flutter-apk/app-release.apk
