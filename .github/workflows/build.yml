name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Repair Android structure with SDK 34
      run: |
        rm -rf android
        flutter create . --platforms=android

    - name: Force Compile SDK to 34
      run: |
        sed -i 's/compileSdk = .*/compileSdk = 34/g' android/app/build.gradle || sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
        sed -i 's/targetSdk = .*/targetSdk = 34/g' android/app/build.gradle || sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rehabilitation-app-release
        path: build/app/outputs/flutter-apk/app-release.apk
