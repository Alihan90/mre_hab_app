name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.1' # Ваша стабільна версія Flutter
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Release
        # ТУТ ЗМІНЕНО: додано примусову підтримку 32-бітних та 64-бітних процесорів Android
        run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
