name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Clean and Recreate Android Project
      run: |
        rm -rf android
        flutter create . --platforms=android

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK (Force Global SDK 34)
      # Параметри --compile-sdk та --target-sdk перевизначають версію для абсолютно ВСІХ плагінів глобально
      run: flutter build apk --release --no-tree-shake-icons --compile-sdk=34 --target-sdk=34

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rehabilitation-app-release
        path: "**/build/app/outputs/flutter-apk/*.apk"
